kind = "web"
previewPath = "/"
title = "Decorê Arts"
version = "1.0.0"
id = "artifacts/decore-arts"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 22794
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/decore-arts run dev"

[services.env]
PORT = "22794"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/decore-arts", "run", "build"]
publicDir = "artifacts/decore-arts/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
